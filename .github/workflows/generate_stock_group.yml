name: 生成股票组配置

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'topics/**'
      - 'topics-json/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'topics/**'
      - 'topics-json/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 运行生成脚本
        run: python3 scripts/generate_stock_group.py
